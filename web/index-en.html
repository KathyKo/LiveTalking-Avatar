<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3f37c9;
            --bg: #f0f4fc;
            --card-bg: rgba(255,255,255,0.85);
            --radius: 14px;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #1e293b;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .navbar-brand { font-weight: 700; }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 16px 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header i { color: var(--primary); }
        .card-body { padding: 20px; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #4361ee, #3f37c9);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary-custom:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(67,97,238,0.3); color: #fff; }
        .btn-primary-custom:active { transform: translateY(0); }
        .btn-danger-custom { background: #ef4444; border: none; color: #fff; font-weight: 600; border-radius: 8px; padding: 8px 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-danger-custom:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(239,68,68,0.3); }
        .btn-danger-custom:active { transform: translateY(0); }
        .btn-outline-custom { border: 2px solid var(--primary); color: var(--primary); font-weight: 600; border-radius: 8px; padding: 8px 16px; background: transparent; cursor: pointer; transition: all 0.2s; }
        .btn-outline-custom:hover { background: var(--primary); color: #fff; }
        .btn-outline-custom:active { transform: scale(0.97); }
        .btn-primary-custom, .btn-outline-custom, .btn-danger-custom { white-space: nowrap; }
        .btn-sm.btn-primary-custom, .btn-sm.btn-outline-custom { padding: 5px 10px; font-size: 0.8rem; }
        .btn-sm.btn-primary-custom i, .btn-sm.btn-outline-custom i { font-size: 0.8rem; }
        video { width: 100%; border-radius: 8px; background: #000; }
        .session-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; }
        .connected { background: #d1fae5; color: #065f46; }
        .disconnected { background: #fee2e2; color: #991b1b; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.on { background: #10b981; }
        .status-dot.off { background: #ef4444; }
        .quick-link { text-decoration: none; }
        .quick-link .glass-card { transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
        .quick-link:hover .glass-card { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
        label { font-weight: 500; font-size: 0.9rem; color: #64748b; margin-bottom: 4px; }
        .param-hint { font-size: 0.75rem; color: #94a3b8; }
        ::placeholder { color: #9ca3af !important; opacity: 1; }
        :-ms-input-placeholder { color: #9ca3af; }
        .chat-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.9rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
        .chat-user { background: #4361ee; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-bot { background: rgba(0,0,0,0.06); color: #1e293b; margin-right: auto; border-bottom-left-radius: 4px; }
        .app-shell { padding-top: 24px; }
        .main-layout { display: flex; gap: 26px; align-items: center; min-height: calc(100vh - 48px); }
        .avatar-pane { flex: 0 0 52%; max-width: 52%; }
        .chat-pane { flex: 1; min-width: 360px; }
        .avatar-stage { position: relative; display: flex; align-items: center; justify-content: center; }
        .avatar-pane .glass-card { background: transparent; border: 0; box-shadow: none; margin: 0; }
        .avatar-pane .card-header { display: none !important; }
        .avatar-pane .card-body { padding: 0; }
        .avatar-pane .mt-3 { margin-top: 0 !important; }
        #video { background: #999 !important; }
        #btnMic { margin: 56px auto 0; transform: none; z-index: 20; display: flex; align-items: center; gap: 12px; padding: 16px 34px; border: 2px solid #f97316; border-radius: 999px; background: rgba(0,0,0,0.82); color: #fff; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
        #btnMic.listening { border-color: #ef4444; background: rgba(127,29,29,0.92); }
        .chat-pane .glass-card { height: calc(100vh - 56px); border-radius: 44px; margin: 0; overflow: hidden; }
        .chat-pane .card-header { justify-content: space-between; padding: 28px 32px 12px; font-size: 1.35rem; }
        .chat-pane .card-header #txtType { width: 170px; border: 0; border-bottom: 1px solid rgba(0,0,0,0.12); border-radius: 0; box-shadow: none; font-size: 1.1rem; }
        .chat-pane .card-body { display: flex; flex-direction: column; height: calc(100% - 78px); padding: 0 24px 28px; }
        #chatResponse { flex: 1; height: auto !important; min-height: 0 !important; border: 0 !important; background: transparent !important; }
        .chat-composer { display: flex; align-items: center; gap: 12px; }
        .latency-row { display: flex; flex-wrap: wrap; gap: 5px 14px; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.08); color: #64748b; font-size: 0.72rem; }
        .latency-row strong { color: #334155; font-variant-numeric: tabular-nums; }
        .chat-bot p:last-child { margin-bottom: 0; }
        .chat-media { width: 100%; max-height: 320px; margin-top: 8px; border-radius: 6px; background: #000; }
        .tour-qr { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .tour-qr img { width: 144px; height: 144px; padding: 6px; border-radius: 4px; background: #fff; }
        .tour-qr a { font-size: 0.85rem; }
        #txtMessage { height: 42px; min-height: 42px; resize: none; border: 1px solid #d1d5db; border-radius: 999px; font-size: 1.05rem; padding: 8px 16px; overflow: hidden; }
        @media (max-width: 992px) {
            .main-layout { flex-direction: column; }
            .avatar-pane, .chat-pane { flex: 0 0 auto; max-width: 100%; width: 100%; }
            .avatar-stage { min-height: auto; }
        }
    </style>
</head>
<body>

<div class="container-fluid app-shell px-4">
    <span class="session-badge disconnected visually-hidden" id="statusBadge"><span class="status-dot off"></span>Disconnected</span>
    <span class="visually-hidden" id="sessionIdDisplay">SID: -</span>
    <!-- Quick Links -->
    <div class="row g-3 mb-2 d-none">
        <div class="col-md-3">
            <a href="/avatar-en.html" class="quick-link" target="_blank">
                <div class="glass-card p-3 text-center">
                    <i class="bi bi-person-bounding-box fs-2" style="color: #4361ee;"></i>
                    <div class="fw-bold mt-2">Avatar Creator</div>
                    <div class="small text-muted">Generate digital human avatars</div>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/admin-en.html" class="quick-link" target="_blank">
                <div class="glass-card p-3 text-center">
                    <i class="bi bi-speedometer2 fs-2" style="color: #4361ee;"></i>
                    <div class="fw-bold mt-2">Admin Console</div>
                    <div class="small text-muted">Monitor sessions &amp; config</div>
                </div>
            </a>
        </div>
        <div class="col-md-3">
            <a href="/tts/index-en.html" class="quick-link" target="_blank">
                <div class="glass-card p-3 text-center">
                    <i class="bi bi-soundwave fs-2" style="color: #4361ee;"></i>
                    <div class="fw-bold mt-2">TTS Voice Manager</div>
                    <div class="small text-muted">Voices · Clone · Synthesize</div>
                </div>
            </a>
        </div>
    </div>

    <div class="main-layout">
        <!-- Left Column: Connection + Video -->
        <div class="avatar-pane">
            <!-- 1. WebRTC Connection -->
            <div class="glass-card">
                <div class="card-header"><i class="bi bi-broadcast"></i> WebRTC Connection</div>
                <div class="card-body">
                    <div id="offerError" class="alert alert-danger mt-3" role="alert" style="display:none;"></div>
                    <div class="mt-3 avatar-stage">
                        <video id="video" autoplay playsinline muted style="width:100%; aspect-ratio:4/3; height:auto; max-height:calc(100vh - 210px); display:block; margin:0 auto; object-fit:cover; object-position:center; border-radius:0; background:#000;"></video>
                    </div>
                </div>
            </div>
            <div style="text-align:center; margin-top:12px;">
                <select id="avatarSelect" onchange="switchAvatar()" class="form-select form-select-sm" style="display:inline-block; width:auto; min-width:200px;" title="Switch avatar (no restart)"></select>
            </div>
            <button class="btn-outline-custom btn-sm" id="btnMic" onclick="toggleMic()" title="Voice input"><i class="bi bi-mic"></i><span>Press to Talk</span></button>
        </div>

        <!-- Right Column: Drivers + Actions -->
        <div class="chat-pane">
            <!-- 2. Text Driver -->
            <div class="glass-card">
                <div class="card-header">
                    <span><i class="bi bi-chat-text-fill"></i> Chat</span>
                    <select class="form-select form-select-sm" id="txtType">
                        <option value="chat">Chat</option>
                        <option value="echo">Echo</option>
                    </select>
                </div>
                <div class="card-body">
                    <div id="chatResponse" style="height:calc(100vh - 420px); min-height:400px; overflow-y:auto; padding:12px; background:rgba(255,255,255,0.6); border:1px solid rgba(0,0,0,0.08); border-radius:8px; display:flex; flex-direction:column;"></div>
                    <div class="chat-composer">
                        <textarea class="form-control form-control-sm" id="txtMessage" rows="1" placeholder="Enter a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
                        <button class="btn-primary-custom btn-sm" onclick="sendText()"><i class="bi bi-send"></i> Send</button>
                        <button class="btn-danger-custom btn-sm" onclick="interrupt()" title="Stop the avatar talking"><i class="bi bi-stop-circle"></i> Stop</button>
                        <button class="btn-outline-custom btn-sm" onclick="document.getElementById('chatResponse').innerHTML=''" title="Clear chat"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let pc = null;
let sessionid = null;
let remoteStream = null;
let outputAudioUnlocked = false;
let connecting = false;
let reconnectTimer = null;

function updateStatus(connected) {
    const badge = document.getElementById('statusBadge');
    if (connected) {
        badge.className = 'session-badge connected visually-hidden';
        badge.innerHTML = '<span class="status-dot on"></span>Connected';
    } else {
        badge.className = 'session-badge disconnected visually-hidden';
        badge.innerHTML = '<span class="status-dot off"></span>Disconnected';
    }
}

function setSessionId(sid) {
    sessionid = sid;
    document.getElementById('sessionIdDisplay').textContent = 'SID: ' + (sid || '-');
}

function showError(msg) {
    const el = document.getElementById('offerError');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 8000);
}

// --- Voice input (mic → /api/asr → textarea → send) ---
let micWs = null, micCtx = null, micStream = null, micNode = null, micOn = false;

// The ASR server assumes 16 kHz mono. Browsers usually capture at 44.1/48 kHz;
// sending that as-if-16k garbles recognition (wrong words, wrong language). Downsample.
function down16k(buf, inRate) {
    if (inRate === 16000) return buf;
    const ratio = inRate / 16000;
    const outLen = Math.floor(buf.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
        const start = Math.floor(i * ratio), end = Math.min(Math.floor((i + 1) * ratio), buf.length);
        let s = 0, n = 0;
        for (let j = start; j < end; j++) { s += buf[j]; n++; }
        out[i] = n ? s / n : (buf[start] || 0);
    }
    return out;
}

async function toggleMic() {
    unlockOutputAudio();   // this click is a user gesture — unlock avatar audio playback now
    if (micOn) { stopMic(true); return; }
    if (!sessionid) return alert('Please connect WebRTC first');
    interrupt();   // stop the avatar so it listens instead of talking over you (keeps its voice out of the mic)
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) { return alert('Microphone permission denied'); }

    micOn = true;
    const btn = document.getElementById('btnMic');
    btn.innerHTML = '<i class="bi bi-mic-fill"></i><span>Listening... Press to Stop</span>';
    btn.classList.add('listening');
    document.getElementById('txtMessage').placeholder = 'Listening... click mic again to finish';

    const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    micWs = new WebSocket(proto + location.host + '/api/asr');
    micWs.onopen = () => {
        micWs.send(JSON.stringify({ chunk_size: [5, 10, 5], wav_name: 'h5', is_speaking: true, mode: '2pass', itn: false }));
        micCtx = new AudioContext();   // native rate; we resample to 16k ourselves (forcing 16k is unreliable across browsers)
        const inRate = micCtx.sampleRate;
        const src = micCtx.createMediaStreamSource(micStream);
        micNode = micCtx.createScriptProcessor(4096, 1, 1);
        micNode.onaudioprocess = (e) => {
            if (!micWs || micWs.readyState !== 1 || !micOn) return;
            const out = down16k(e.inputBuffer.getChannelData(0), inRate);   // guarantee true 16 kHz to the ASR server
            const i16 = new Int16Array(out.length);
            for (let i = 0; i < out.length; i++) i16[i] = Math.max(-32768, Math.min(32767, out[i] * 32768));
            micWs.send(i16.buffer);
        };
        src.connect(micNode);
        micNode.connect(micCtx.destination);
    };
    micWs.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.is_final) {
            // strip SenseVoice emotion emojis and symbols
            const clean = (msg.text || '').replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, '').trim();
            stopMic(false);
            if (clean) {
                document.getElementById('txtMessage').value = clean;
                sendText();
            } else {
                addBubble('bot', '[no speech recognized]');
            }
        }
    };
    micWs.onerror = () => stopMic(false);
}

function stopMic(sendStop) {
    if (micNode) { micNode.disconnect(); micNode = null; }
    if (micCtx) { micCtx.close(); micCtx = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (micWs && micWs.readyState === 1 && sendStop) {
        micWs.send(JSON.stringify({ is_speaking: false }));
        // ws stays open until the final result arrives in onmessage
    } else if (micWs) {
        micWs.close(); micWs = null;
        document.getElementById('txtMessage').placeholder = 'Enter a message...';
    }
    micOn = false;
    const btn = document.getElementById('btnMic');
    btn.innerHTML = '<i class="bi bi-mic"></i><span>Press to Talk</span>';
    btn.classList.remove('listening');
}

// --- WebRTC ---
function negotiate(peer) {
    peer.addTransceiver('video', { direction: 'recvonly' });
    peer.addTransceiver('audio', { direction: 'recvonly' });
    return peer.createOffer().then(offer => peer.setLocalDescription(offer)).then(() => {
        return new Promise(resolve => {
            if (peer.iceGatheringState === 'complete') resolve();
            else {
                const check = () => { if (peer.iceGatheringState === 'complete') { peer.removeEventListener('icegatheringstatechange', check); resolve(); } };
                peer.addEventListener('icegatheringstatechange', check);
            }
        });
    }).then(() => {
        const offer = peer.localDescription;
        // Per-avatar voice mapping (ElevenLabs voice IDs; falls back to launch --REF_FILE)
        const AVATAR_VOICE = {
            'ditto_man': 'aSXZu6bgEOS8MXVRzjPi',
            'ditto_woman': 'SEWXl8lPSO01tdGbWECX',
            'avatar_man': 'aSXZu6bgEOS8MXVRzjPi',
            'avatar_woman2': 'SEWXl8lPSO01tdGbWECX',
        };
        const sel = document.getElementById('avatarSelect');
        const chosenAvatar = (sel && sel.value) || undefined;   // per-session avatar from the dropdown
        const body = {
            sdp: offer.sdp,
            type: offer.type,
            avatar: chosenAvatar,
            refaudio: (chosenAvatar && AVATAR_VOICE[chosenAvatar]) || undefined,
        };
        return fetch('/offer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    }).then(res => res.json()).then(answer => {
        // Check for server-side error code
        if (answer.code && answer.code !== 0) {
            throw new Error(answer.msg || 'Unknown server error');
        }
        if (!answer.sdp) {
            throw new Error('Server returned no SDP');
        }
        if (answer.sessionid) setSessionId(answer.sessionid);
        return peer.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answer.sdp }));
    }).catch(e => {
        if (pc !== peer) return;
        const msg = e.message || String(e);
        showError(msg);
        // Reset connection state on error
        pc = null;
        connecting = false;
        peer.close();
        updateStatus(false);
        setSessionId(null);
        // always auto-retry (kiosk mode — no connect/disconnect UI)
        scheduleReconnect();
    });
}

function scheduleReconnect(delay = 2000) {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        if (!pc || ['failed', 'closed', 'disconnected'].includes(pc.connectionState)) start();
    }, delay);
}

async function start() {
    if (connecting || (pc && ['new', 'connecting', 'connected'].includes(pc.connectionState))) return;
    if (pc) { const old = pc; pc = null; old.close(); }
    connecting = true;
    document.getElementById('offerError').style.display = 'none';
    // Fetch ICE servers from backend (Cloudflare TURN, auto-refreshed, never expires)
    let iceServers = [{ urls: 'stun:stun.cloudflare.com:3478' }];
    try {
        const r = await fetch('/api/iceservers');
        const j = await r.json();
        if (j.iceServers && j.iceServers.length) iceServers = j.iceServers;
    } catch (e) { console.warn('iceservers fetch failed, using STUN only', e); }
    const config = { sdpSemantics: 'unified-plan', iceServers };
    const peer = new RTCPeerConnection(config);
    pc = peer;
    const stream = new MediaStream();
    const video = document.getElementById('video');
    peer.addEventListener('track', evt => {
        if (pc !== peer) return;
        if (!stream.getTracks().some(track => track.id === evt.track.id)) {
            stream.addTrack(evt.track);
        }
        remoteStream = stream;
        video.srcObject = stream;
        video.muted = !outputAudioUnlocked;
        video.play().catch(() => {});
    });
    peer.addEventListener('connectionstatechange', () => {
        if (pc !== peer) return;
        if (peer.connectionState === 'connected') {
            connecting = false;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            updateStatus(true);
        } else if (peer.connectionState === 'disconnected') {
            updateStatus(false);
            scheduleReconnect(5000);
        } else if (peer.connectionState === 'failed' || peer.connectionState === 'closed') {
            connecting = false;
            pc = null;
            updateStatus(false);
            setSessionId(null);
            // always auto-reconnect (kiosk mode — no connect/disconnect UI)
            scheduleReconnect();
        }
    });
    negotiate(peer);
}

// --- Text / Chat ---
const CHAT_API_URL = 'https://voncierge-lang-agent.hipster-virtual.com/chat/sse';

function unlockOutputAudio() {
    const video = document.getElementById('video');
    outputAudioUnlocked = true;
    video.muted = false;
    video.play().catch(() => {});
}

// Send one sentence to the avatar to speak (echo = speak the given text verbatim)
async function speak(text, doInterrupt, pauseMs = 520, final = true) {
    unlockOutputAudio();
    const resp = await fetch('/human', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, type: 'echo', interrupt: doInterrupt, pause_ms: pauseMs, final, sessionid: String(sessionid) }),
    });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || data.code) throw new Error(data.msg || 'avatar speak failed');
}

let speakQueue = Promise.resolve();
let speakGen = 0;   // bumped by interrupt() to cancel sentences queued but not yet sent

function queueSpeak(text, doInterrupt, pauseMs = 520, final = true) {
    const gen = speakGen;
    speakQueue = speakQueue.catch(() => {}).then(() => {
        if (gen !== speakGen) return;   // an interrupt happened → drop this stale queued sentence
        return speak(text, doInterrupt, pauseMs, final);
    });
    return speakQueue;
}

// Where to cut a chunk to send to the avatar. Start speaking ASAP: full-stop
// anywhere, OR a comma/clause once we're past SOFT_MIN, OR a word boundary once a
// run passes HARD_MAX — so a long first sentence doesn't stall the avatar.
function firstSentenceEnd(s) {
    const SOFT_MIN = 20, HARD_MAX = 40;
    let lastSpace = -1;
    let inUrl = false;
    for (let i = 0; i < s.length; i++) {
        const c = s[i];
        if (!inUrl && (s.startsWith('https://', i) || s.startsWith('http://', i))) {
            inUrl = true;
        }
        if (inUrl) {
            if (/\s/.test(c)) inUrl = false;
            continue;
        }
        if ('!?。！？\n'.includes(c)) return i;                                   // strong sentence end
        if (c === '.' && i + 1 < s.length && /\s/.test(s[i + 1])) return i;       // period + space
        if (i >= SOFT_MIN && ',，、;；:：'.includes(c)) return i;                   // long clause → break at comma
        if (c === ' ') lastSpace = i;
        if (i >= HARD_MAX && lastSpace >= SOFT_MIN) return lastSpace;             // very long run → word boundary
    }
    return -1;
}

// Split only at semantic boundaries. Comma-sized chunks made ElevenLabs reset
// prosody and forced Ditto to repeatedly restart its speech motion.
function semanticBoundary(s, force = false) {
    const HARD_MAX = 240;
    const CONTINUATION_PAUSE_MS = 80;
    let lastSpace = -1;
    let inUrl = false;
    for (let i = 0; i < s.length; i++) {
        const c = s[i];
        if (!inUrl && (s.startsWith('https://', i) || s.startsWith('http://', i))) inUrl = true;
        if (inUrl) {
            if (/\s/.test(c)) inUrl = false;
            continue;
        }
        if (c === ' ') lastSpace = i;
        const priorToken = s.slice(0, i).match(/([A-Za-z.]{1,12})$/);
        const abbreviation = priorToken && [
            'e.g', 'i.e', 'etc', 'vs', 'excl', 'incl', 'approx', 'no',
            'mr', 'mrs', 'ms', 'dr', 'prof', 'sr', 'jr', 'st'
        ].includes(priorToken[1].toLowerCase());
        const isPeriod = c === '.' && !abbreviation &&
            (i + 1 >= s.length || /\s/.test(s[i + 1]));
        if ('!?\u3002\uff01\uff1f'.includes(c) || isPeriod) {
            if (i + 1 >= s.length && !force) return null;
            const paragraph = s.slice(i + 1).match(/^[ \t]*\r?\n[ \t]*\r?\n/);
            return { end: i + 1 + (paragraph ? paragraph[0].length : 0), pauseMs: paragraph ? 900 : 520 };
        }
        if (c === ':' && (i + 1 < s.length || force)) {
            const listStart = s.slice(i + 1).match(/^[ \t]*\r?\n/);
            if (listStart) return { end: i + 1 + listStart[0].length, pauseMs: 760 };
        }
        // A forced word-boundary split is not a sentence break. Keep just enough
        // silence for the next ElevenLabs request to join without a visible reset.
        if (i >= HARD_MAX && lastSpace >= 1) {
            return { end: lastSpace + 1, pauseMs: CONTINUATION_PAUSE_MS };
        }
    }
    return force && s.trim() ? { end: s.length, pauseMs: 520 } : null;
}

function addBubble(who, text) {
    const out = document.getElementById('chatResponse');
    const div = document.createElement('div');
    div.className = 'chat-bubble ' + (who === 'user' ? 'chat-user' : 'chat-bot');
    if (who === 'user') {
        div.textContent = text;
    } else {
        const content = document.createElement('div');
        content.className = 'bubble-content';
        content.textContent = text;
        div.appendChild(content);
    }
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
    return div;
}

const VIDEO_URL_RE = /`?(https?:\/\/[^\s`<>"']+?\.(?:mp4|mov|webm)(?:\?[^\s`<>"']*)?)`?/gi;
const CHAT_URL_RE = /`?(https?:\/\/[^\s`<>"')]+)`?/gi;

function isAirsquireTour(url) {
    try {
        return new URL(url).hostname.endsWith('airsquire.ai');
    } catch (_) {
        return false;
    }
}

function renderBotBubble(el, text) {
    const content = el.querySelector('.bubble-content') || el;
    if (!window.marked || !window.DOMPurify) {
        content.textContent = text;
        return;
    }
    const appendMarkdown = markdown => {
        if (!markdown) return;
        const template = document.createElement('template');
        template.innerHTML = DOMPurify.sanitize(marked.parse(markdown));
        content.appendChild(template.content);
    };
    content.replaceChildren();
    let offset = 0;
    for (const match of text.matchAll(CHAT_URL_RE)) {
        appendMarkdown(text.slice(offset, match.index));
        const url = match[1];
        const directVideo = /\.(?:mp4|mov|webm)(?:\?[^\s`<>"']*)?$/i.test(url);
        if (directVideo) {
            const video = document.createElement('video');
            video.className = 'chat-media';
            video.controls = true;
            video.playsInline = true;
            video.preload = 'metadata';
            video.src = url;
            content.appendChild(video);
        } else if (isAirsquireTour(url)) {
            const tour = document.createElement('div');
            tour.className = 'tour-qr';
            const qr = document.createElement('img');
            qr.alt = 'QR code for Interactive 360 Tour';
            qr.src = 'https://api.qrserver.com/v1/create-qr-code/?size=144x144&format=svg&data=' + encodeURIComponent(url);
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = 'Open interactive 360 tour';
            tour.append(qr, link);
            content.appendChild(tour);
        } else {
            appendMarkdown(match[0]);
        }
        offset = match.index + match[0].length;
    }
    appendMarkdown(text.slice(offset));
}

function toSpeechText(text) {
    return text
        .replace(/(?:📹\s*)?Video Walkthrough\s*:/gi, ' ')
        .replace(/(?:🗺️?\s*)?Interactive 360°?\s*Tour(?:\s*\(powered by Airsquire\))?\s*:/gi, ' ')
        .replace(VIDEO_URL_RE, ' ')
        .replace(/!?\[([^\]]*)\]\(https?:\/\/[^)]+\)/g, '$1')
        .replace(/https?:\/\/\S+/g, ' ')
        .replace(/\b(?:id|token|share)=[A-Za-z0-9_-]+/gi, ' ')
        .replace(/[*#_`>~]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
}

function addLatencyRow(bubble) {
    const row = document.createElement('div');
    row.className = 'latency-row';
    row.hidden = true;
    row.setAttribute('aria-live', 'polite');
    row.innerHTML = '<span hidden>First character: <strong></strong></span>' +
        '<span hidden>First TTS: <strong></strong></span>' +
        '<span hidden>Complete response: <strong></strong></span>' +
        '<span hidden>Avatar started: <strong></strong></span>';
    bubble.appendChild(row);
    const values = row.querySelectorAll('strong');
    return { firstChar: values[0], firstTts: values[1], complete: values[2], avatar: values[3] };
}

function setLatency(el, startedAt, name) {
    const seconds = (performance.now() - startedAt) / 1000;
    const value = seconds.toFixed(2) + 's';
    el.textContent = value;
    el.parentElement.hidden = false;
    el.closest('.latency-row').hidden = false;
    console.info('[latency]', name, value);
}

async function getAvatarTiming() {
    const resp = await fetch('/avatar_timing', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionid: String(sessionid) }),
    });
    const data = await resp.json();
    return data.code === 0 ? data.data : { tts_seq: 0, avatar_seq: 0 };
}

let latencyTurn = 0;
async function watchAvatarTiming(startedAt, turn, metrics, baseline) {
    const deadline = performance.now() + 60000;
    let gotTts = false, gotAvatar = false;
    while (turn === latencyTurn && performance.now() < deadline && (!gotTts || !gotAvatar)) {
        try {
            const timing = await getAvatarTiming();
            if (!gotTts && timing.tts_seq > baseline.tts_seq) {
                gotTts = true;
                setLatency(metrics.firstTts, startedAt, 'firstTts');
            }
            if (!gotAvatar && timing.avatar_seq > baseline.avatar_seq) {
                gotAvatar = true;
                setLatency(metrics.avatar, startedAt, 'avatarStarted');
            }
        } catch (e) { /* retry until timeout */ }
        await new Promise(resolve => setTimeout(resolve, 25));
    }
}

async function sendText() {
    unlockOutputAudio();
    const el = document.getElementById('txtMessage');
    const out = document.getElementById('chatResponse');
    const text = el.value.trim();
    const mode = document.getElementById('txtType').value;
    if (!text || !sessionid) return alert('Please connect WebRTC first');
    const startedAt = performance.now();
    const turn = ++latencyTurn;
    el.value = '';

    addBubble('user', text);

    if (mode === 'echo') {
        const botBubble = addBubble('bot', 'Echo');
        const metrics = addLatencyRow(botBubble);
        metrics.firstChar.textContent = 'n/a';
        metrics.complete.textContent = 'n/a';
        await interrupt();
        watchAvatarTiming(startedAt, turn, metrics, { tts_seq: 0, avatar_seq: 0 });
        await queueSpeak(text, false, 520, true);     // just speak what was typed
        return;
    }

    // chat: stream text on screen AND speak each sentence the moment it completes,
    // so the avatar starts on sentence 1 instead of waiting for the whole reply.
    const botBubble = addBubble('bot', '');
    const metrics = addLatencyRow(botBubble);
    const interruptPromise = interrupt();  // stop speech while the chat request starts in parallel
    speakQueue = interruptPromise.catch(() => {});
    interruptPromise.then(() => {
        watchAvatarTiming(startedAt, turn, metrics, { tts_seq: 0, avatar_seq: 0 });
    });
    let reply = '', spoken = 0, gotFirstCharacter = false;
    const flushSentences = (force) => {
        for (;;) {
            const rest = reply.slice(spoken);
            const boundary = semanticBoundary(rest, force);
            if (!boundary) break;
            const s = toSpeechText(rest.slice(0, boundary.end));
            spoken += boundary.end;
            if (s) queueSpeak(s, false, boundary.pauseMs, false);
        }
        if (force) {
            const tail = toSpeechText(reply.slice(spoken));
            if (tail) queueSpeak(tail, false, 520, false);
            spoken = reply.length;
            // Every completed sentence already carries its semantic pause.
            // The empty final marker only flushes Ditto's remaining model tail.
            queueSpeak('', false, 20, true);
        }
    };
    try {
        const resp = await fetch(CHAT_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: String(sessionid) }),
        });
        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let sse = '', done = false;
        while (!done) {
            const r = await reader.read();
            if (r.done) break;
            sse += dec.decode(r.value, { stream: true });
            let nl;
            while ((nl = sse.indexOf('\n')) >= 0) {
                const line = sse.slice(0, nl).trim(); sse = sse.slice(nl + 1);
                if (!line.startsWith('data:')) continue;
                let obj; try { obj = JSON.parse(line.slice(5).trim()); } catch (e) { continue; }
                const chunk = obj.data || '';
                if (chunk) {
                    if (!gotFirstCharacter) {
                        gotFirstCharacter = true;
                        setLatency(metrics.firstChar, startedAt, 'firstCharacter');
                    }
                    reply += chunk;
                    renderBotBubble(botBubble, reply);
                    out.scrollTop = out.scrollHeight;
                    flushSentences(false);            // speak completed sentences immediately
                }
                if (obj.final_token) { done = true; break; }
            }
        }
        flushSentences(true);                         // speak the final partial sentence
        setLatency(metrics.complete, startedAt, 'completeResponse');
    } catch (e) {
        reply += '\n[error: ' + (e.message || e) + ']';
        renderBotBubble(botBubble, reply);
    }
}

// --- Interrupt ---
function interrupt() {
    speakGen++;                            // invalidate every sentence still queued in the frontend
    speakQueue = Promise.resolve();
    if (!sessionid) return Promise.resolve();
    return fetch('/interrupt_talk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionid: String(sessionid) }),
    }).then(r => r.json()).then(d => console.log('interrupt:', d)).catch(() => {});
}

// --- Speaking Status ---
function checkSpeaking() {
    if (!sessionid) return alert('Please connect WebRTC first');
    fetch('/is_speaking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionid: String(sessionid) }),
    }).then(r => r.json()).then(d => alert('Speaking: ' + JSON.stringify(d.data)));
}

// Populate the avatar switcher from the backend, marking the server default.
async function loadAvatarList() {
    const sel = document.getElementById('avatarSelect');
    if (!sel) return;
    try {
        const j = await fetch('/api/avatars').then(r => r.json());
        const avatars = (j.data && j.data.avatars) || [];
        let def = '';
        try {
            const c = await fetch('/api/admin/config').then(r => r.json());
            def = (c.data && c.data.config && c.data.config.avatar_id) || '';
        } catch (e) { /* config endpoint optional */ }
        sel.innerHTML = '';
        avatars.forEach(id => {
            const o = document.createElement('option');
            o.value = id;
            o.textContent = id + (id === def ? ' (default)' : '');
            if (id === def) o.selected = true;
            sel.appendChild(o);
        });
    } catch (e) { console.warn('avatar list failed', e); }
}

// Switch avatar live — no backend restart. Reconnect with the chosen avatar;
// build_avatar_session loads it on the backend for this session (+ its voice).
async function switchAvatar() {
    interrupt();
    if (pc) { pc.close(); pc = null; }
    connecting = false;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    setSessionId(null);
    document.getElementById('video').srcObject = null;
    remoteStream = null;
    await start();   // start()/negotiate() reads #avatarSelect
}

// Load the switcher, then auto-connect to the default avatar.
loadAvatarList().then(() => start());

</script>
